apiVersion: apps/v1
kind: Deployment
metadata:
  name: bsf-backend
  labels:
    app: bsf-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bsf-backend
  template:
    metadata:
      labels:
        app: bsf-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/pugpau/bsf-larvae-monitoring/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        - name: LOG_LEVEL
          value: "info"
        - name: INFLUXDB_URL
          valueFrom:
            configMapKeyRef:
              name: bsf-config
              key: influxdb-url
        - name: INFLUXDB_TOKEN
          valueFrom:
            secretKeyRef:
              name: bsf-secrets
              key: influxdb-token
        - name: INFLUXDB_ORG
          valueFrom:
            configMapKeyRef:
              name: bsf-config
              key: influxdb-org
        - name: INFLUXDB_BUCKET
          valueFrom:
            configMapKeyRef:
              name: bsf-config
              key: influxdb-bucket
        - name: MQTT_BROKER_HOST
          valueFrom:
            configMapKeyRef:
              name: bsf-config
              key: mqtt-host
        - name: MQTT_BROKER_PORT
          valueFrom:
            configMapKeyRef:
              name: bsf-config
              key: mqtt-port
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bsf-backend
spec:
  selector:
    app: bsf-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
