apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bsf-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
  - host: bsf-monitoring.example.com  # Replace with actual domain
    http:
      paths:
      - path: /api/(.*)
        pathType: Prefix
        backend:
          service:
            name: bsf-backend
            port:
              number: 8000
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: bsf-frontend
            port:
              number: 80
