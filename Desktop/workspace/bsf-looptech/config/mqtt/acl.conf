# BSF-LoopTech MQTT Access Control List (ACL)
# This file defines topic-level permissions for MQTT users

# ============================================================
# デフォルトルール：認証されていないユーザーの全トピックアクセスを拒否
# ============================================================

# ============================================================
# 管理者ユーザー (bsf_admin)
# - 全てのトピックを読み書き可能
# - システム監視とデバッグ用
# ============================================================
user bsf_admin
topic readwrite #

# ============================================================
# BSF センサーデバイス用ユーザー (bsf_device)
# - センサーデータの送信専用
# - 基質データの読み取り（設定同期用）
# - デバイス制御コマンドの受信
# ============================================================
user bsf_device

# センサーデータ送信権限
topic write bsf/+/sensors/+
topic write bsf/+/devices/+/data
topic write bsf/+/devices/+/status

# 基質設定データの読み取り権限
topic read bsf/+/substrates/+/config
topic read bsf/+/devices/+/config

# デバイス制御コマンドの受信権限
topic read bsf/+/devices/+/commands
topic read bsf/+/devices/+/control

# テスト用トピック権限
topic readwrite bsf/test/+

# ============================================================
# フロントエンドアプリケーション用ユーザー (bsf_frontend)
# - 全センサーデータの読み取り
# - デバイス制御コマンドの送信
# ============================================================
user bsf_frontend
topic read bsf/+/sensors/+
topic read bsf/+/devices/+/data
topic read bsf/+/devices/+/status
topic write bsf/+/devices/+/commands
topic read bsf/+/substrates/+

# ============================================================
# 将来的な拡張ユーザー（コメントアウト）
# ============================================================

# # 外部システム連携用ユーザー（ERP等）
# user bsf_external
# topic read bsf/+/sensors/+
# topic read bsf/+/substrates/+

# ============================================================
# システムトピックへのアクセス制御
# ============================================================

# システム情報は管理者のみアクセス可能
user bsf_admin
topic read $SYS/+

# ============================================================
# 特殊なトピックパターンの例
# ============================================================

# # サイト別アクセス制御（将来の多拠点展開用）
