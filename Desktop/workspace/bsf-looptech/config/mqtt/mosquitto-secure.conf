# BSF-LoopTech Secure MQTT Broker Configuration
# This configuration enables TLS encryption and authentication

# === ポートとリスナー設定 ===
# 開発用として平文リスナーも一時的に維持（段階的移行用）
listener 1883
protocol mqtt

# === 認証設定 ===
# 匿名接続を禁止
allow_anonymous false

# パスワードファイルのパス
password_file /Users/tonton/Desktop/workspace/bsf-looptech/config/mqtt/password.txt

# === アクセス制御設定 ===
# ACLファイルのパス
acl_file /Users/tonton/Desktop/workspace/bsf-looptech/config/mqtt/acl.conf

# === TLS設定（ポート8883リスナー用） ===
listener 8883
protocol mqtt

# CA証明書のパス
cafile /Users/tonton/Desktop/workspace/bsf-looptech/config/mqtt/certs/ca.crt

# サーバー証明書のパス
certfile /Users/tonton/Desktop/workspace/bsf-looptech/config/mqtt/certs/server.crt

# サーバー秘密鍵のパス
keyfile /Users/tonton/Desktop/workspace/bsf-looptech/config/mqtt/certs/server.key

# クライアント証明書は要求しない（ユーザー名/パスワード認証のため）
require_certificate false

# TLS version
tls_version tlsv1.2

# === ログ設定 ===
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type debug
log_type all

# === 永続化設定 ===
persistence true
persistence_location /tmp/mosquitto/

# === セキュリティ設定 ===
# 最大接続数制限
max_connections 100

# メッセージサイズ制限（1MB）
message_size_limit 1048576

# === トピック設定 ===
# システムトピックへのアクセスを制限
sys_interval 60