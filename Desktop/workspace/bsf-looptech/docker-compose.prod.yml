# BSF-LoopTech Production — Blue-Green Deployment
# Usage: docker compose -f docker-compose.prod.yml [up|down|build|...]
# Deploy: ./scripts/deploy-blue-green.sh [init|deploy|rollback|status]

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: bsf-postgres
    environment:
      POSTGRES_DB: bsf_system
      POSTGRES_USER: bsf_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - bsf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsf_user -d bsf_system"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend-blue:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bsf-backend-blue
    environment:
      DATABASE_URL: postgresql+asyncpg://bsf_user:${POSTGRES_PASSWORD}@postgres:5432/bsf_system
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SKIP_AUTH: ${SKIP_AUTH:-false}
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      LLM_MODEL: openai/gpt-oss-20b
    volumes:
      - ./logs:/app/logs
      - model_registry:/app/model_registry
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bsf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend-green:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bsf-backend-green
    environment:
      DATABASE_URL: postgresql+asyncpg://bsf_user:${POSTGRES_PASSWORD}@postgres:5432/bsf_system
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SKIP_AUTH: ${SKIP_AUTH:-false}
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      LLM_MODEL: openai/gpt-oss-20b
    volumes:
      - ./logs:/app/logs
      - model_registry:/app/model_registry
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bsf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: bsf-frontend-builder
    volumes:
      - frontend_build:/app/build
    profiles:
      - build
    networks:
      - bsf-network

  router:
    image: nginx:alpine
    container_name: bsf-router
    volumes:
      - ./config/nginx-router.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    networks:
      - bsf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  model_registry:
    driver: local
  frontend_build:
    driver: local

networks:
  bsf-network:
    driver: bridge
