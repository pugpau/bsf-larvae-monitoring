[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: ユニットテスト
    integration: 統合テスト
    e2e: エンドツーエンドテスト
    slow: 実行時間が長いテスト
    database: データベースを使用するテスト
    auth: 認証が必要なテスト

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --durations=10

minversion = 6.0
asyncio_mode = auto

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning